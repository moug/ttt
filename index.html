<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de IMC - Unificada</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de IMC</h1>
        
        <label for="txtPeso">Peso (kg):</label>
        <input type="number" id="txtPeso" step="0.1" placeholder="Ex: 70">
        
        <label for="txtAltura">Altura (m):</label>
        <input type="number" id="txtAltura" step="0.01" placeholder="Ex: 1.75">
        
        <button onclick="processarImc()">Calcular IMC</button>
        
        <h3>Resultado:</h3>
        <div id="txtResultado" class="output-area">Aguardando dados...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
